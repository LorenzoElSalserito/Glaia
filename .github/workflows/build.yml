name: Build desktop packages

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-latest
            package_script: package:linux
            artifact_glob: dist/glaia-desktop.deb
          - platform: windows
            os: windows-latest
            package_script: package:win
            artifact_glob: dist/glaia-desktop.exe
          - platform: macos
            os: macos-latest
            package_script: package:mac
            artifact_glob: dist/glaia-desktop.dmg

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build package
        run: npm run ${{ matrix.package_script }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: glaia-${{ matrix.platform }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
